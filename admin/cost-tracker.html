<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不现实商店 · 成本台账</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1612;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --red: #c23b2a;
    --gold: #b8933f;
    --sage: #7a8c6e;
    --muted: #8c8070;
    --blue: #4a5490;
    --orange: #b85a1a;
    --border: #ddd6c8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 36px 24px 80px;
  }

  header {
    max-width: 1400px;
    margin: 0 auto 28px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    flex-wrap: wrap;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(20px, 3.5vw, 30px);
    letter-spacing: -0.5px;
  }
  header .sub {
    font-family: 'Noto Serif SC', serif;
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  /* SUMMARY CARDS */
  .summary-row {
    max-width: 1400px;
    margin: 0 auto 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .summary-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    padding: 12px 14px;
  }
  .summary-card .s-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .summary-card .s-val {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--ink);
  }
  .summary-card .s-sub {
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* CONTROLS */
  .controls {
    max-width: 1400px;
    margin: 0 auto 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls select, .controls input {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    padding: 5px 10px;
    color: var(--ink);
    outline: none;
  }
  .controls select:focus, .controls input:focus {
    border-color: var(--gold);
  }
  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    border: 1.5px solid;
    cursor: pointer;
    transition: all 0.12s;
  }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: #2d2620; }
  .btn-outline {
    background: white;
    color: var(--ink);
    border-color: var(--border);
  }
  .btn-outline:hover { border-color: var(--ink); }
  .btn-danger {
    background: white;
    color: var(--red);
    border-color: #e8d0cc;
    font-size: 9px;
    padding: 4px 8px;
  }
  .btn-danger:hover { background: #fde8e5; }

  /* TABLE */
  .table-wrap {
    max-width: 1400px;
    margin: 0 auto;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
    min-width: 960px;
  }

  thead {
    background: var(--cream);
    border-bottom: 2px solid var(--ink);
  }
  thead th {
    text-align: left;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 12px;
    white-space: nowrap;
    border-right: 1px solid var(--border);
  }
  thead th:last-child { border-right: none; }

  tbody tr {
    border-bottom: 1px dashed var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf8f4; }
  tbody tr.highlight { background: #fdf6e3; }

  tbody td {
    padding: 9px 12px;
    border-right: 1px solid #f0ece4;
    vertical-align: middle;
  }
  tbody td:last-child { border-right: none; }

  /* editable cells */
  td[contenteditable="true"] {
    outline: none;
    cursor: text;
  }
  td[contenteditable="true"]:focus {
    background: #fffef8;
    box-shadow: inset 0 0 0 1.5px var(--gold);
    border-radius: 1px;
  }

  .product-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 12.5px;
    font-weight: 700;
    min-width: 130px;
  }
  .series-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .tag-dawenhao { background: #edf2ea; color: var(--sage); border: 1px solid var(--sage); }
  .tag-mofa     { background: #fdf6e3; color: var(--gold); border: 1px solid var(--gold); }
  .tag-jiukou   { background: #eef0f8; color: var(--blue); border: 1px solid var(--blue); }
  .tag-other    { background: #fde8e5; color: var(--red);  border: 1px solid var(--red); }
  .tag-keyboard { background: #f0ece4; color: var(--orange); border: 1px solid var(--orange); }
  .tag-cup      { background: #eef4f8; color: #3a7a8c; border: 1px solid #3a7a8c; }
  .tag-deskpad  { background: #f4eef8; color: #7a3a8c; border: 1px solid #7a3a8c; }

  /* keycap type tags */
  .kt-pbt       { background: #edf2ea; color: var(--sage);   border: 1px solid var(--sage);   font-size:9px; padding:2px 6px; border-radius:2px; white-space:nowrap; }
  .kt-metal     { background: #fdf6e3; color: var(--gold);   border: 1px solid var(--gold);   font-size:9px; padding:2px 6px; border-radius:2px; white-space:nowrap; }
  .kt-pbt-liu   { background: #eef0f8; color: var(--blue);   border: 1px solid var(--blue);   font-size:9px; padding:2px 6px; border-radius:2px; white-space:nowrap; }
  .kt-pc-liu    { background: #fde8e5; color: var(--red);    border: 1px solid var(--red);    font-size:9px; padding:2px 6px; border-radius:2px; white-space:nowrap; }
  .kt-pbt-full  { background: #f0e8f4; color: #8a3aac;       border: 1px solid #8a3aac;       font-size:9px; padding:2px 6px; border-radius:2px; white-space:nowrap; }
  .kt-pbt-metal { background: #fff3e0; color: #b85a1a;       border: 1px solid #b85a1a;       font-size:9px; padding:2px 6px; border-radius:2px; white-space:nowrap; }
  .kt-na        { color: var(--muted); font-size:9px; }

  .cost-cell {
    font-variant-numeric: tabular-nums;
    text-align: right;
    font-size: 11px;
    white-space: nowrap;
  }
  .cost-total {
    font-weight: 700;
    color: var(--ink);
  }
  .cost-muted { color: var(--muted); }

  .margin-cell {
    font-weight: 700;
    text-align: right;
    font-size: 11px;
    white-space: nowrap;
  }
  .margin-good { color: var(--sage); }
  .margin-ok   { color: var(--gold); }
  .margin-thin { color: var(--red); }
  .margin-na   { color: var(--muted); font-weight: 400; font-style: italic; }

  .maker-tag {
    font-size: 9px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
  }

  .note-cell {
    font-family: 'Noto Serif SC', serif;
    font-size: 10px;
    color: var(--muted);
    max-width: 180px;
    line-height: 1.5;
  }

  /* section header row */
  tr.section-row td {
    background: var(--ink);
    color: var(--paper);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-right-color: #2d2620;
    font-family: 'DM Serif Display', serif;
    font-size: 11px;
    letter-spacing: 0.05em;
  }

  /* ADD ROW FORM */
  .add-panel {
    max-width: 1400px;
    margin: 20px auto 0;
    background: white;
    border: 1.5px dashed var(--border);
    border-radius: 4px;
    padding: 18px 20px;
    display: none;
  }
  .add-panel.open { display: block; }
  .add-panel h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    margin-bottom: 14px;
    color: var(--ink);
  }
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 2px;
    padding: 6px 8px;
    color: var(--ink);
    outline: none;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--gold);
    background: white;
  }
  .form-actions { display: flex; gap: 8px; }

  .footer-note {
    max-width: 1400px;
    margin: 12px auto 0;
    font-size: 9px;
    color: var(--muted);
  }

  /* print */
  @media print {
    .controls, .add-panel, .btn { display: none !important; }
    body { padding: 20px; }
  }
</style>

// ── SERIES TAG ────────────────────────────────────────────────────────
function seriesTag(s) {
  const map = {
    '大文豪': ['tag-dawenhao','大文豪'],
    '魔法':   ['tag-mofa','魔法'],
    '入口':   ['tag-jiukou','入口'],
    '键盘':   ['tag-keyboard','键盘'],
    '杯子':   ['tag-cup','杯子'],
    '桌垫':   ['tag-deskpad','桌垫'],
    '其他':   ['tag-other','其他'],
  };
  const [cls, label] = map[s] || ['tag-other', s];
  return `<span class="series-tag ${cls}">${label}</span>`;
}

// ── KTYPE TAG ─────────────────────────────────────────────────────────
function ktypeTag(kt) {
  if (!kt) return '<span class="kt-na">—</span>';
  const map = {
    'PBT':         ['kt-pbt',      'PBT 热升华'],
    '金属漆':      ['kt-metal',    '金属漆'],
    'PBT+鎏金':    ['kt-pbt-liu',  'PBT＋鎏金＋喷油'],
    'PC+鎏金':     ['kt-pc-liu',   'PC＋鎏金/UV'],
    'PBT全鎏金':   ['kt-pbt-full', 'PBT＋热升华＋鎏金＋喷油'],
    'PBT+金属漆':   ['kt-pbt-metal','PBT＋金属漆（混）'],
  };
  const [cls, label] = map[kt] || ['kt-na', kt];
  return `<span class="${cls}">${label}</span>`;
}
const KEYCAP_SERIES = ['大文豪','魔法','入口'];
function totalCost(p) {
  const base = (p.material||0) + (p.process||0) + (p.pack||0) + (p.ship||0);
  if (KEYCAP_SERIES.includes(p.series)) {
    const keycapCost = (p.material||0) + (p.process||0) + (p.ship||0);
    return base + keycapCost * 0.01;
  }
  return base;
}
function margin(p) {
  if (!p.price) return null;
  return p.price - totalCost(p);
}
function marginPct(p) {
  if (!p.price) return null;
  return ((margin(p) / p.price) * 100).toFixed(1);
}

// ── RENDER ────────────────────────────────────────────────────────────
function marginClass(pct) {
  if (pct === null) return 'margin-na';
  if (pct >= 55) return 'margin-good';
  if (pct >= 40) return 'margin-ok';
  return 'margin-thin';
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filterS = document.getElementById('filterSeries').value;
  const filterM = document.getElementById('filterMaker').value;

  const filtered = products.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(search) || p.note.toLowerCase().includes(search);
    const matchSeries = !filterS || p.series === filterS;
    const matchMaker  = !filterM || p.maker === filterM;
    return matchSearch && matchSeries && matchMaker;
  });

  // group by series
  const groups = {};
  filtered.forEach(p => {
    if (!groups[p.series]) groups[p.series] = [];
    groups[p.series].push(p);
  });

  let html = '';
  Object.entries(groups).forEach(([series, rows]) => {
    html += `<tr class="section-row"><td colspan="14">${series === '键盘' ? '键盘' : series + '系列'} &nbsp;·&nbsp; ${rows.length} 款</td></tr>`;
    rows.forEach(p => {
      const tc = totalCost(p);
      const m  = margin(p);
      const mp = marginPct(p);
      const mClass = marginClass(mp !== null ? parseFloat(mp) : null);

      html += `<tr data-id="${p.id}">
        <td class="product-name" contenteditable="true" onblur="editCell(${p.id},'name',this)">${p.name}</td>
        <td>${seriesTag(p.series)}</td>
        <td class="maker-tag">${p.maker}</td>
        <td>${ktypeTag(p.ktype)}</td>
        <td class="cost-cell cost-muted" contenteditable="true" onblur="editCellNum(${p.id},'material',this)">¥${p.material||0}</td>
        <td class="cost-cell cost-muted" contenteditable="true" onblur="editCellNum(${p.id},'process',this)">${(p.process||0) > 0 ? '¥'+(p.process||0) : '—'}</td>
        <td class="cost-cell cost-muted" contenteditable="true" onblur="editCellNum(${p.id},'pack',this)">¥${p.pack||0}</td>
        <td class="cost-cell cost-muted" contenteditable="true" onblur="editCellNum(${p.id},'ship',this)">¥${p.ship||0}</td>
        <td class="cost-cell cost-total">¥${tc.toFixed(1)}</td>
        <td class="cost-cell" contenteditable="true" onblur="editCellNum(${p.id},'price',this)" style="color:var(--blue)">${p.price ? '¥'+p.price : '—'}</td>
        <td class="cost-cell ${mClass}">${m !== null ? '¥'+m.toFixed(1) : '—'}</td>
        <td class="margin-cell ${mClass}">${mp !== null ? mp+'%' : '—'}</td>
        <td class="note-cell" contenteditable="true" onblur="editCell(${p.id},'note',this)">${p.note}</td>
        <td><button class="btn btn-danger" onclick="deleteRow(${p.id})">删除</button></td>
      </tr>`;
    });
  });

  document.getElementById('tableBody').innerHTML = html;
  renderSummary(filtered);
}

function renderSummary(list) {
  const withPrice = list.filter(p => p.price > 0);
  const avgMargin = withPrice.length
    ? (withPrice.reduce((a,p) => a + parseFloat(marginPct(p)||0), 0) / withPrice.length).toFixed(1)
    : '—';
  const avgCost = list.length
    ? (list.reduce((a,p) => a + totalCost(p), 0) / list.length).toFixed(0)
    : '—';
  const skus = list.length;

  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-card">
      <div class="s-label">显示 SKU 数</div>
      <div class="s-val">${skus}</div>
      <div class="s-sub">共 ${products.length} 款</div>
    </div>
    <div class="summary-card">
      <div class="s-label">平均总成本</div>
      <div class="s-val">¥${avgCost}</div>
      <div class="s-sub">键帽 / 键盘混合</div>
    </div>
    <div class="summary-card">
      <div class="s-label">平均毛利率</div>
      <div class="s-val">${avgMargin}%</div>
      <div class="s-sub">已定价产品均值</div>
    </div>
    <div class="summary-card">
      <div class="s-label">最高成本单品</div>
      <div class="s-val" style="font-size:16px">${list.reduce((a,p) => totalCost(p)>totalCost(a)?p:a, list[0]||{name:'—'}).name}</div>
      <div class="s-sub">¥${list.reduce((a,p) => Math.max(a, totalCost(p)), 0).toFixed(0)}</div>
    </div>
    <div class="summary-card">
      <div class="s-label">最薄利润款</div>
      <div class="s-val" style="font-size:16px;color:var(--red)">${withPrice.reduce((a,p) => parseFloat(marginPct(p))<parseFloat(marginPct(a)||99)?p:a, withPrice[0]||{name:'—'}).name}</div>
      <div class="s-sub">需关注</div>
    </div>
  `;
}

// ── EDIT ──────────────────────────────────────────────────────────────
function editCell(id, field, el) {
  const p = products.find(x => x.id === id);
  if (p) { p[field] = el.innerText.trim(); renderTable(); }
}
function editCellNum(id, field, el) {
  const p = products.find(x => x.id === id);
  if (p) {
    const raw = el.innerText.replace(/[¥,]/g,'').trim();
    p[field] = parseFloat(raw) || 0;
    renderTable();
  }
}

// ── ADD / DELETE ──────────────────────────────────────────────────────
function toggleAddPanel() {
  const panel = document.getElementById('addPanel');
  panel.classList.toggle('open');
}
function addRow() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('请输入产品名称'); return; }
  products.push({
    id: nextId++,
    name,
    series:  document.getElementById('f_series').value,
    maker:   document.getElementById('f_maker').value || '—',
    material: parseFloat(document.getElementById('f_base').value)||0,
    process:  parseFloat(document.getElementById('f_copper').value)||0,
    pack:    parseFloat(document.getElementById('f_pack').value)||0,
    ship:    parseFloat(document.getElementById('f_ship').value)||0,
    price:   parseFloat(document.getElementById('f_price').value)||0,
    note:    document.getElementById('f_note').value,
  });
  ['f_name','f_maker','f_base','f_copper','f_pack','f_ship','f_price','f_note'].forEach(id => {
    document.getElementById(id).value = '';
  });
  toggleAddPanel();
  renderTable();
}
function deleteRow(id) {
  if (!confirm('确认删除这条记录？')) return;
  products = products.filter(p => p.id !== id);
  renderTable();
}

// ── FILTER ────────────────────────────────────────────────────────────
function filterTable() { renderTable(); }

// ── EXPORT ────────────────────────────────────────────────────────────
function exportCSV() {
  const headers = ['产品名称','系列','代工方','本体成本','铜件/配件','包装','运费','单套总成本','定价','毛利','毛利率','备注'];
  const rows = products.map(p => {
    const tc = totalCost(p);
    const m  = margin(p);
    const mp = marginPct(p);
    return [p.name, p.series, p.maker, p.base, p.copper, p.pack, p.ship, tc.toFixed(1), p.price||'—', m!==null?m.toFixed(1):'—', mp!==null?mp+'%':'—', p.note].join(',');
  });
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '不现实商店_成本台账.csv';
  a.click();
}
